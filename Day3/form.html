<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./form.css">
    <title>Registration-Form</title>
  </head>
  <body>
    <header><h1>Registration Form</h1></header>
    <main>
      <h2>Registration</h2>
      <form novalidate>
        <fieldset>
          <legend>Personal Details</legend>
          <p>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="FullName" required />
            <span class="show-error"></span>
          </p>
          <p>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob"/>
          </p>

          <p>
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Age" name="age" required />
            <span class="show-error"></span>
          </p>
          <p>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email" name="email" />
            <span class="show-error"></span>
          </p>
          <p>
            <label for="telephone">Telephone</label>
            <input type="tel" id="telephone" name="telephone" required/>
            <span class="show-error"></span>
          </p>
        </fieldset>
        <fieldset>
          <legend>Account</legend>
          <p>
            <label for="uname">User Name</label>
            <input
              type="text"
              id="uname"
              placeholder="Username"
              pattern="[A-Za-z0-9]{3,20}"
              name="username"
            />
            <span class="show-error"></span>
          </p>
          <p>
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Password"
              name="password"
            />
            <span class="show-error"></span>
          </p>
          <p>
            <label for="cpassword">Confirm password</label>
            <input
              type="password"
              id="cpassword"
              name="cpassword"
              placeholder="Confirm password"
              minlength="8"
              maxlength="17"
            />
            <span class="show-error"></span>
          </p>
          <p>
            <input type="checkbox" id="check" />
            <label for="check">Remember me</label>
          </p>
        </fieldset>
        <fieldset>
          <legend>Preferences</legend>
          <p>
            <input type="radio" id="radio" />
            <label for="radio">Turn On Notification</label>
          </p>
          <p>
            <label for="skill">Programming level</label>
            <input type="range" id="skill" min="0" max="10" />
          </p>
          <p>
            <label for="color">Profile colour picker</label>
            <input type="color" id="color" />
          </p>
        </fieldset>
        <fieldset>
          <legend>Educational Information</legend>
          <p>
            <label for="url">GitHub URL</label>
            <input type="url" id="url" />
          </p>
          <p>
            <label for="month">Passout Month</label>
            <input type="month" id="month" />
          </p>
          <p>
            <label for="file">Certificate</label>
            <input type="file" id="file" />
          </p>
          <p>
            <label for="time">Start Time</label>
            <input type="time" id="time" />
          </p>
        </fieldset>
        <fieldset>
          <legend>Other Information</legend>
          <p>
            <label for="job">Job Title:</label>
            <input type="text" id="job" list="options" />
            <datalist id="options">
              <option value="Software Engineer">Software Engineer</option>
              <option value="Product Manager"></option>
              <option value="HR"></option>
              <option value="QA"></option>
              <option value="Finance Manager"></option>
              <option value="Teacher"></option>
              <option value="Delivery Boy"></option>
              <option value="Chef"></option>
            </datalist>
          </p>
          <p>
            <label for="ldatetime">Schedule your interview</label>
            <input type="datetime-local" id="ldatetime" />
          </p>
          <p>
            <label for="join">Enter Available Join Week</label>
            <input type="week" id="join" />
          </p>
        </fieldset>
        <input type="submit">
      </form>
    </main>
    <script src="./formvalidation.js"></script>
  </body>
</html>
