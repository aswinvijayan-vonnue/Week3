<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./gitAbout.css" />
  </head>
  <body>
    
    <div class="search-container">
        
      <form action="" class="input-form">
        <input type="text" class="input" placeholder="Enter username" />
        <button type="submit" class="submit-button">
          <svg
            data-encore-id="icon"
            role="img"
            aria-hidden="true"
            class="e-10451-icon search"
            fill=""
            black
            style="
              --encore-icon-height: var(--encore-graphic-size-decorative-base);
              --encore-icon-width: var(--encore-graphic-size-decorative-base);
            "
            viewBox="0 0 24 24"
          >
            <path
              d="M10.533 1.27893C5.35215 1.27893 1.12598 5.41887 1.12598 10.5579C1.12598 15.697 5.35215 19.8369 10.533 19.8369C12.767 19.8369 14.8235 19.0671 16.4402 17.7794L20.7929 22.132C21.1834 22.5226 21.8166 22.5226 22.2071 22.132C22.5976 21.7415 22.5976 21.1083 22.2071 20.7178L17.8634 16.3741C19.1616 14.7849 19.94 12.7634 19.94 10.5579C19.94 5.41887 15.7138 1.27893 10.533 1.27893ZM3.12598 10.5579C3.12598 6.55226 6.42768 3.27893 10.533 3.27893C14.6383 3.27893 17.94 6.55226 17.94 10.5579C17.94 14.5636 14.6383 17.8369 10.533 17.8369C6.42768 17.8369 3.12598 14.5636 3.12598 10.5579Z"
            ></path>
          </svg>
        </button>
      </form>
    </div>
    <div class="error"></div>
    <div class="gitHub">
      <div class="side-bar">
        <div class="header-card">
          <div class="avatar-div">
            <!-- <img
              alt=""
              src="https://avatars.githubusercontent.com/u/290254223?v=4"
              class="avatar"
            /> -->
          </div>
          <div class="name-area">
            <h1 class="name-card">
              <span class="name"></span>
              <span class="uname"></span>
            </h1>
          </div>
          <div class="followers-following-area">
            <div class="followers">
              <svg
                text="muted"
                aria-hidden="true"
                data-component="Octicon"
                height="16"
                viewBox="0 0 16 16"
                version="1.1"
                width="16"
                fill="rgb(145, 152, 161)"
                data-view-component="true"
                class="octicon octicon-people"
              >
                <path
                  d="M2 5.5a3.5 3.5 0 1 1 5.898 2.549 5.508 5.508 0 0 1 3.034 4.084.75.75 0 1 1-1.482.235 4 4 0 0 0-7.9 0 .75.75 0 0 1-1.482-.236A5.507 5.507 0 0 1 3.102 8.05 3.493 3.493 0 0 1 2 5.5ZM11 4a3.001 3.001 0 0 1 2.22 5.018 5.01 5.01 0 0 1 2.56 3.012.749.749 0 0 1-.885.954.752.752 0 0 1-.549-.514 3.507 3.507 0 0 0-2.522-2.372.75.75 0 0 1-.574-.73v-.352a.75.75 0 0 1 .416-.672A1.5 1.5 0 0 0 11 5.5.75.75 0 0 1 11 4Zm-5.5-.5a2 2 0 1 0-.001 3.999A2 2 0 0 0 5.5 3.5Z"
                ></path>
              </svg>
              <span class="followers-number numbering"></span><span>follower</span>
            </div>
            <span> . </span>
            <div class="following">
              <span class="numbering following-number"></span><span>following</span>
            </div>
          </div>
          <div class="bioAndLocation">
          </div>
        </div>
      </div>
      <div class="main-area">
        <div class="top-repo-container">
          <h2 class="popular-repo">Popular repositories</h2>
          <ol class="repo-list">
          </ol>
        </div>
      </div>
    </div>
    <script type="module" src="./gitAbout.js"></script>
  </body>
</html>
